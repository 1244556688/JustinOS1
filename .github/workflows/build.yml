name: Build ISO
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install live-build
        run: sudo apt-get update && sudo apt-get install -y live-build
      - name: Build
        run: sudo ./build.sh
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: JustinOS-ISO
          path: JustinOS_Final.iso
